<!doctype html>
<html lang="hr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vozilahrfavicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Vozila.hr" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <script>
      // Pre-React theme bootstrap. Reads stored preference, falls back to light
      // (the new default per phase 13.1). Kept inline so there's no FOUC.
      try {
        var stored = localStorage.getItem('vozila_theme');
        var useDark = stored === 'dark';
        if (useDark) document.documentElement.classList.add('dark');
      } catch (e) { /* private mode / no localStorage */ }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Supabase: warm the TLS handshake before the first listings query fires.
         dns-prefetch is the cheap fallback for browsers that ignore preconnect
         on cross-origin without crossorigin attribute. -->
    <link rel="preconnect" href="https://supabase.co" crossorigin>
    <link rel="dns-prefetch" href="https://supabase.co">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,400;0,600;0,700;0,900;1,800;1,900&display=swap" rel="stylesheet">
    
    <!-- Primary Meta Tags -->
    <title>Vozila.hr - Premium Auto Marketplace</title>
    <meta name="title" content="Vozila.hr - Premium Auto Marketplace" />
    <meta name="description" content="Vozila.hr je vodeća premium trgovina automobila u Hrvatskoj. Kupujte i prodajte automobile, motocikle, nautiku i opremu na jednoj platformi." />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vozila.hr/" />
    <meta property="og:title" content="Vozila.hr - Premium Auto Marketplace" />
    <meta property="og:description" content="Vozila.hr je vodeća premium trgovina automobila u Hrvatskoj. Kupujte i prodajte automobile, motocikle, nautiku i opremu na jednoj platformi." />
    <meta property="og:image" content="/vozilahrlogo-dark.svg" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://vozila.hr/" />
    <meta property="twitter:title" content="Vozila.hr - Premium Auto Marketplace" />
    <meta property="twitter:description" content="Vozila.hr je vodeća premium trgovina automobila u Hrvatskoj. Kupujte i prodajte automobile, motocikle, nautiku i opremu na jednoj platformi." />
    <meta property="twitter:image" content="/vozilahrlogo-dark.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
